name: "Build Universal Mirror (Win/Mac/Linux)"
on: [push, pull_request]

jobs:
  build-and-deploy:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # 1. Setup .NET for Orleans 10 Grains
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Orleans 10 requires .NET 8

      - name: Build Orleans Grains (WASM/Core)
        run: dotnet publish ./src/OrleansCore -c Release -o ./build/orleans

      # 2. Setup Godot for the Universe HUD
      - name: Setup Godot
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          relative_project_path: ./src/GodotUniverse
          archive_output: true
          
      # 3. Artifact the persistent "Mirror"
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: Mirror-${{ matrix.platform }}
          path: |
            ./build/orleans
            ./src/GodotUniverse/exports/${{ matrix.platform }}
